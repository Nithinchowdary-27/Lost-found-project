<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}
.container{
    width:90%;
    margin:auto;
}
.card{
    background:white;
    color:black;
    padding:15px;
    border-radius:10px;
    margin:10px;
}
.grid{
    display:flex;
    gap:20px;
}
.item{
    background:#f1f1f1;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
img{
    width:100%;
    height:150px;
    object-fit:cover;
}
button{
    padding:8px;
    margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Dashboard</h2>
<a href="/logout" style="color:white;">Logout</a>

<div class="card">
<form method="POST" action="/add" enctype="multipart/form-data">
<input name="name" placeholder="Item Name" required>
<input name="description" placeholder="Description" required>
<input name="phone" placeholder="Mobile Number" required>

<select name="type">
<option value="lost">Lost</option>
<option value="found">Found</option>
</select>

<input type="file" name="image" required>

<button>Add Item</button>
</form>
</div>

<div class="grid">

<div class="card">
<h3>Lost</h3>
{% for i in lost %}
<div class="item">
<img src="/{{i[4]}}">
<p><b>{{i[1]}}</b></p>
<p>{{i[2]}}</p>
<p>📞 {{i[3]}}</p>
<a href="/delete/{{i[0]}}">Delete</a>
</div>
{% endfor %}
</div>

<div class="card">
<h3>Found</h3>
{% for i in found %}
<div class="item">
<img src="/{{i[4]}}">
<p><b>{{i[1]}}</b></p>
<p>{{i[2]}}</p>
<p>📞 {{i[3]}}</p>
<a href="/delete/{{i[0]}}">Delete</a>
</div>
{% endfor %}
</div>

</div>

</div>

</body>
</html>

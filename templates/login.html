<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{background:linear-gradient(135deg,#667eea,#764ba2);display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial}
.card{background:white;padding:30px;border-radius:15px;width:300px;text-align:center}
input{width:100%;padding:10px;margin:10px 0}
button{width:100%;padding:10px;background:#667eea;color:white;border:none}
</style>
</head>
<body>
<div class="card">
<h2>Login</h2>

{% if error %}
<p style="color:red;">{{error}}</p>
{% endif %}

<form method="POST">
<input name="username" placeholder="Username">
<input name="password" placeholder="Password">
<button>Login</button>
</form>

<a href="/register">Register</a>
</div>
</body>
</html>
